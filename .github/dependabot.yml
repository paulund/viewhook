version: 2
updates:
    # Enable version updates for Composer (PHP dependencies)
    - package-ecosystem: 'composer'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
          timezone: 'Etc/UTC'
      open-pull-requests-limit: 10
      labels:
          - 'dependencies'
          - 'php'
      commit-message:
          prefix: 'chore(deps)'
          include: 'scope'

    # Enable version updates for npm (JavaScript dependencies)
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
          timezone: 'Etc/UTC'
      open-pull-requests-limit: 10
      labels:
          - 'dependencies'
          - 'javascript'
      commit-message:
          prefix: 'chore(deps)'
          include: 'scope'

    # Enable version updates for GitHub Actions
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
          timezone: 'Etc/UTC'
      open-pull-requests-limit: 5
      labels:
          - 'dependencies'
          - 'github-actions'
      commit-message:
          prefix: 'chore(deps)'
          include: 'scope'
